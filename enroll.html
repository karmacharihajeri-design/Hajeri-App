<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>चेहरा नोंदणी</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js" onerror="document.body.insertAdjacentHTML('afterbegin','<div style=&quot;background:#7A1F2B;color:#fff;padding:10px;text-align:center;font-size:12px;&quot;>चूक: face-api.js (चेहरा-ओळख इंजिन) लोड होऊ शकले नाही — इंटरनेट कनेक्शन तपासा</div>')"></script>
</head>
<body>
<div class="wrap">
  <div class="back-btn-row">
    <button class="back-btn" onclick="history.back()">← मागे जा</button>
  </div>

  <div class="topbar" style="background:var(--maroon);">
    <h1>चेहरा नोंदणी</h1>
    <p id="userNameLbl"></p>
    <p data-app-name style="font-size:10px;opacity:.8;"></p>
  </div>

  <p style="font-size:12px;text-align:center;">
    दाढी वाढली, चष्मा घातला किंवा कोन बदलला तरी ओळख होण्यासाठी
    <b>५ वेगवेगळ्या पोझमध्ये</b> चेहरा आपोआप नोंदवला जाईल — फक्त सूचनेप्रमाणे
    मान वळवा व स्थिर रहा, कुठलंही बटण दाबायची गरज नाही.
  </p>

  <div style="text-align:center;margin-top:10px;">
    <span id="progressLbl" style="font-weight:700;color:var(--green-deep);">पायरी १ / ५</span>
  </div>
  <div id="poseInstruction" style="text-align:center;font-size:16px;font-weight:700;margin-top:6px;color:var(--maroon);">
    सरळ समोर पहा
  </div>

  <div class="video-frame"><video id="video" autoplay muted playsinline></video></div>
  <div class="face-status" id="faceStatus">कॅमेरा सुरू होत आहे...</div>
  <div id="msgBox"></div>

  <div class="nav">
    <button class="outline" onclick="doLogout()" style="width:auto;padding:8px 16px;">लॉगआउट</button>
  </div>
</div>

<script src="config.js" onerror="document.body.insertAdjacentHTML('afterbegin','<div style=&quot;background:#7A1F2B;color:#fff;padding:10px;text-align:center;font-size:12px;&quot;>चूक: config.js लोड होऊ शकले नाही — फोल्डर रचना/पाथ तपासा</div>')"></script>
<script src="api.js" onerror="document.body.insertAdjacentHTML('afterbegin','<div style=&quot;background:#7A1F2B;color:#fff;padding:10px;text-align:center;font-size:12px;&quot;>चूक: api.js लोड होऊ शकले नाही — फोल्डर रचना/पाथ तपासा</div>')"></script>
<script src="auth-guard.js"></script>
<script src="settings-sync.js"></script>
<script src="face-utils.js"></script>
<script src="ui-utils.js"></script>
<script>
const loggedInMobile = localStorage.getItem("mobileNumber");
const loggedInRole = localStorage.getItem("role");
const urlParams = new URLSearchParams(window.location.search);
const assistedMobile = urlParams.get("mobile");
const isAssisted = !!assistedMobile && (loggedInRole === "admin" || loggedInRole === "developer");
const mobile = isAssisted ? assistedMobile : loggedInMobile;

const video = document.getElementById("video");
const faceStatus = document.getElementById("faceStatus");
const msgBox = document.getElementById("msgBox");
const progressLbl = document.getElementById("progressLbl");
const poseInstruction = document.getElementById("poseInstruction");

const POSES = [
  "सरळ समोर पहा",
  "हळूच डावीकडे वळा",
  "हळूच उजवीकडे वळा",
  "थोडं वर पहा",
  "थोडं खाली पहा",
];

const STABLE_HITS_NEEDED = 4; // एकत्रित हिट्स (चुकलेल्या फ्रेमने फक्त १ ने कमी होतात, शून्यावर रीसेट होत नाही)
let poseIndex = 0;
let hitCount = 0;
let capturing = false; // पुढच्या पोझकडे वळण्यासाठी थोडा वेळ — या दरम्यान नवीन कॅप्चर टाळायचे
const collectedDescriptors = [];

document.getElementById("userNameLbl").textContent = isAssisted
  ? "साहाय्यक नोंदणी — मोबाईल: " + mobile
  : (localStorage.getItem("name") || "");

async function init() {
  faceStatus.textContent = "मॉडेल लोड होत आहे...";
  try {
    await loadFaceModels();
    await startCamera(video);
    updatePoseUI();
    detectLoop();
  } catch (e) {
    faceStatus.textContent = e.message;
    faceStatus.className = "face-status face-no";
    const retryBtn = document.createElement("button");
    retryBtn.className = "outline";
    retryBtn.textContent = "📷 कॅमेरा पुन्हा सुरू करा";
    retryBtn.onclick = init;
    msgBox.innerHTML = "";
    msgBox.appendChild(retryBtn);
  }
}

function updatePoseUI() {
  progressLbl.textContent = "पायरी " + (poseIndex + 1) + " / " + POSES.length;
  poseInstruction.textContent = POSES[poseIndex];
}

async function detectLoop() {
  // कॅमेऱ्यासमोर सक्रियपणे चेहरा शोधणं चालू आहे — हीदेखील "activity" धरून
  // standby (निष्क्रियता) टायमरमुळे मध्येच लॉगआउट होऊ नये
  if (typeof window.pingStandbyActivity === "function") window.pingStandbyActivity();

  if (capturing) { setTimeout(detectLoop, 300); return; }

  const descriptor = await detectFaceDescriptor(video);
  if (descriptor) {
    hitCount = Math.min(STABLE_HITS_NEEDED, hitCount + 1);
    if (hitCount >= STABLE_HITS_NEEDED) {
      faceStatus.textContent = "चेहरा ओळखला ✓ — कॅप्चर होत आहे...";
      faceStatus.className = "face-status face-ok";
      hitCount = 0;
      autoCapture(descriptor);
      setTimeout(detectLoop, 300);
      return;
    }
    faceStatus.textContent = "चेहरा ओळखला ✓ — स्थिर रहा...";
    faceStatus.className = "face-status face-ok";
  } else {
    hitCount = Math.max(0, hitCount - 1); // एखादी फ्रेम चुकली तरी पूर्ण प्रगती वाया जाऊ नये
    faceStatus.textContent = "चेहरा शोधत आहे...";
    faceStatus.className = "face-status face-no";
  }
  setTimeout(detectLoop, 300);
}

function autoCapture(descriptor) {
  capturing = true;
  collectedDescriptors.push(Array.from(descriptor));
  showToast("✓ \"" + POSES[poseIndex] + "\" कॅप्चर झाले!");
  msgBox.innerHTML = '<div class="msg ok">' + POSES[poseIndex] + ' — कॅप्चर झाले ✓</div>';

  poseIndex++;
  if (poseIndex < POSES.length) {
    updatePoseUI();
    faceStatus.textContent = "पुढच्या पोझसाठी तयार व्हा...";
    setTimeout(() => { capturing = false; }, 1800); // पुढच्या पोझकडे वळण्यासाठी थोडा वेळ
  } else {
    poseInstruction.textContent = "सर्व कोन कॅप्चर झाले ✓";
    progressLbl.textContent = POSES.length + " / " + POSES.length;
    faceStatus.textContent = "नोंदणी पूर्ण होत आहे...";
    setTimeout(finishEnrollment, 900);
  }
}

async function finishEnrollment() {
  msgBox.innerHTML = '<div class="msg ok">नोंदवत आहे...</div>';
  try {
    const res = await Api.enrollFace(mobile, collectedDescriptors);
    if (res.success) {
      if (!isAssisted) localStorage.setItem("faceEnrolled", "1");
      showToast("✅ चेहरा यशस्वीरित्या नोंदवला!");
      msgBox.innerHTML = '<div class="msg ok">चेहरा यशस्वीरित्या नोंदवला!</div>';
      setTimeout(() => {
        window.location.href = isAssisted ? "admin.html" : "attendance.html";
      }, 1200);
    } else {
      msgBox.innerHTML = '<div class="msg err">' + res.message + '</div>';
      showToast(res.message, "err");
      const retryBtn = document.createElement("button");
      retryBtn.className = "primary";
      retryBtn.textContent = "पुन्हा प्रयत्न करा";
      retryBtn.onclick = finishEnrollment;
      msgBox.appendChild(retryBtn);
    }
  } catch (e) {
    msgBox.innerHTML = '<div class="msg err">त्रुटी: ' + e.message + '</div>';
    const retryBtn = document.createElement("button");
    retryBtn.className = "primary";
    retryBtn.textContent = "पुन्हा प्रयत्न करा";
    retryBtn.onclick = finishEnrollment;
    msgBox.appendChild(retryBtn);
  }
}

if (!mobile) window.location.href = "index.html";
else init();
</script>
</body>
</html>
